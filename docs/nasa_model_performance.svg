    <text x="548" y="122">100 - WAPE</text>
    <rect x="704" y="110" width="22" height="14" fill="#fbbf24" opacity="0.86" stroke="#fde68a" stroke-width="2"/>
    <text x="734" y="122">100 - Filtered MAPE</text>
  </g>

