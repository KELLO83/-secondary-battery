<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc">
  <title id="title">NASA Battery Cycle-Level Model Performance</title>
  <desc id="desc">Grouped bar chart comparing validation prediction scores derived from WAPE and filtered MAPE. Higher values are better.</desc>
  <rect width="1500" height="760" fill="#050505"/>
